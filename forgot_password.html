<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PressCoach - Reset Access</title>
    <style>
        :root {
            --cyber-green: #39ff14;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }
        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .card { 
            background: var(--card-bg); 
            padding: 40px; border-radius: 12px; 
            border: 1px solid var(--cyber-green);
            width: 90%; max-width: 350px; text-align: center; 
        }
        input { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #000; color: var(--cyber-green); 
            border: 1px solid #333; outline: none; box-sizing: border-box;
        }
        .btn { 
            background: var(--cyber-green); color: black; 
            border: none; padding: 15px; width: 100%; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .status { margin-top: 15px; font-size: 0.85em; }
        .link { display: block; margin-top: 20px; color: var(--cyber-green); text-decoration: none; font-size: 0.75em; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--cyber-green);">RESET_ACCESS</h2>
        <p style="color: #888; font-size: 0.8em;">ENTER REGISTERED_EMAIL</p>
        <input type="email" id="resetEmail" placeholder="ATHLETE_EMAIL" required>
        <button class="btn" onclick="sendReset()">Send Reset Link</button>
        <div id="resetStatus" class="status"></div>
        <a href="index.html" class="link"><- RETURN_TO_LOGIN</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        // Use your existing config here
        const firebaseConfig = {
            apiKey: "AIzaSyABbIAYEk8cZQGeU__QDEHNCD1wBFhXy7o",
            authDomain: "presscoach-392f1.firebaseapp.com",
            projectId: "presscoach-392f1",
            storageBucket: "presscoach-392f1.firebasestorage.app",
            messagingSenderId: "265120211081",
            appId: "1:265120211081:web:0b8864713b88511d89e658",
            measurementId: "G-NQ6TX59M4H"
        };
        firebase.initializeApp(firebaseConfig);

        let countdownInterval;

        async function sendReset() {
            const email = document.getElementById('resetEmail').value;
            const status = document.getElementById('resetStatus');
            
            if(!email) { status.innerText = "INPUT REQUIRED"; return; }

            const lastSent = localStorage.getItem('last_reset_sent');
            const now = Date.now();
            const cooldown = 5 * 60 * 1000;

            if (lastSent && (now - lastSent < cooldown)) {
                startVisualTimer(parseInt(lastSent) + cooldown);
                return;
            }

            try {
                await firebase.auth().sendPasswordResetEmail(email);
                localStorage.setItem('last_reset_sent', Date.now());
                status.style.color = "var(--cyber-green)";
                status.innerText = "LINK_DISPATCHED: CHECK_INBOX";
                startVisualTimer(Date.now() + cooldown);
            } catch (e) {
                status.style.color = "#ff4444";
                status.innerText = "ERROR: " + e.message;
            }
        }

        function startVisualTimer(targetTime) {
            const status = document.getElementById('resetStatus');
            const btn = document.querySelector('.btn');
            clearInterval(countdownInterval);

            btn.disabled = true;
            btn.style.opacity = "0.4";

            countdownInterval = setInterval(() => {
                const timeLeft = targetTime - Date.now();
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    status.style.color = "var(--cyber-green)";
                    status.innerText = "READY_TO_RESEND";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                } else {
                    const m = Math.floor(timeLeft / 60000);
                    const s = Math.floor((timeLeft % 60000) / 1000);
                    status.style.color = "yellow";
                    status.innerText = `COOLDOWN_ACTIVE: ${m}M ${s}S`;
                }
            }, 1000);
        }

        window.onload = () => {
            const lastSent = localStorage.getItem('last_reset_sent');
            const cooldown = 5 * 60 * 1000;
            if (lastSent && (Date.now() - lastSent < cooldown)) {
                startVisualTimer(parseInt(lastSent) + cooldown);
            }
        };
    </script>
</body>
</html>
