<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PressCoach - Register</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#39ff14">
    <style>
        :root {
            --cyber-green: #39ff14;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .container { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--cyber-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); 
            width: 95%; 
            max-width: 400px; 
            text-align: center; 
        }

        h1 { color: var(--cyber-green); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 12px; 
            border-radius: 4px; 
            border: 1px solid #333; 
            background: #000; 
            color: var(--cyber-green); 
            box-sizing: border-box; 
            outline: none;
        }

        input:focus { border-color: var(--cyber-green); }

        button { 
            background: var(--cyber-green); 
            color: black; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-top: 10px;
        }

        .link-back { margin-top: 20px; display: block; color: var(--cyber-green); text-decoration: none; font-size: 0.75em; opacity: 0.7; }
        .status { margin-top: 15px; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>New_Athlete_Scan</h1>
        <input type="text" id="firstName" placeholder="FIRST_NAME" required>
        <input type="text" id="lastName" placeholder="LAST_NAME" required>
        <input type="number" id="height" placeholder="HEIGHT_CM" required>
        <input type="number" id="weight" placeholder="WEIGHT_KG" required>
        <input type="email" id="email" placeholder="EMAIL_ID" required>
        <input type="password" id="password" placeholder="ACCESS_CODE" required>
        <input type="password" id="confirmPassword" placeholder="CONFIRM_ACCESS_CODE" required>
        <div style="display:flex; align-items:center; margin-bottom:15px; font-size:0.75em; color:#888;">
            <input type="checkbox" id="showRegPass" style="width:auto; margin:0 8px 0 0; cursor:pointer;" onclick="toggleRegPass()">
            <label for="showRegPass" style="cursor:pointer;">SHOW_CODES</label>
        </div>
        <button onclick="registerUser()">Upload Profile</button>
        <a href="index.html" class="link-back">← RETURN_TO_LOGIN</a>
        <div id="regStatus" class="status"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase_config.js"></script>
    <script src="script.js"></script>
</body>
</html>
